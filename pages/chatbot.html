<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Chatbot</title>

    <link rel="stylesheet"
          href="chatbot.css">
</head>
<body>

<nav>

    <a href="../index.html">
        ← Home
    </a>

</nav>

<div class="chat-container">

    <h1>AI Study Assistant</h1>

    <p class="subtitle">
        Ask questions about your studies,
        subjects or learning progress.
    </p>

    <div class="chat-box"
         id="chatBox">

        <div class="bot-message">

            Hello! 👋 <br><br>

            I will soon become your personal
            AI study assistant.

        </div>

    </div>

    <div class="input-area">

        <input type="text"
               id="userInput"
               placeholder="Ask something...">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

const chatBox =
    document.getElementById("chatBox");

function sendMessage() {

    const input =
        document.getElementById(
            "userInput"
        );

    const message =
        input.value.trim();

    if(!message) return;

    // USER MESSAGE
    const userMessage =
        document.createElement("div");

    userMessage.className =
        "user-message";

    userMessage.innerText =
        message;

    chatBox.appendChild(userMessage);

    // BOT RESPONSE
    setTimeout(() => {

        const botMessage =
            document.createElement("div");

        botMessage.className =
            "bot-message";

        botMessage.innerHTML = `

            I am not fully implemented yet,
            but once a suitable AI provider
            has been integrated, I will be
            able to answer all your study
            questions! 🚀

        `;

        chatBox.appendChild(botMessage);

        chatBox.scrollTop =
            chatBox.scrollHeight;

    }, 600);

    input.value = "";

    chatBox.scrollTop =
        chatBox.scrollHeight;
}

</script>

</body>
</html>
