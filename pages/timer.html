<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Study Timer</title>

    <link rel="stylesheet"
          href="timer.css">
</head>
<body>

<nav>

    <a href="subjects.html">
        ← Back to Subjects
    </a>

</nav>

<div class="timer-container">

    <h1 id="subjectName">
        Subject
    </h1>

    <div class="timer"
         id="timer">

        30:00

    </div>

    <div class="buttons">

        <button onclick="startTimer()">
            Start
        </button>

        <button onclick="pauseTimer()">
            Pause
        </button>

        <button onclick="completeSubject()">
            Complete
        </button>

    </div>

</div>

<script>

const params =
    new URLSearchParams(window.location.search);

const subject =
    params.get("subject");

document.getElementById(
    "subjectName"
).innerText = subject;

let time = 1800;

// TEST MODE
if(subject === "Programming 1") {
    time = 10;
}

let timerInterval = null;

const timer =
    document.getElementById("timer");

function updateTimer() {

    const minutes =
        Math.floor(time / 60);

    const seconds =
        time % 60;

    timer.innerText =
        `${minutes}:${
            seconds < 10 ? "0" : ""
        }${seconds}`;

}

function startTimer() {

    if(timerInterval) return;

    timerInterval = setInterval(() => {

        if(time > 0) {

            time--;

            updateTimer();

        } else {

            clearInterval(timerInterval);

            localStorage.setItem(
                subject,
                "completed"
            );

            alert(
                `${subject} completed!`
            );

            window.location.href =
                "subjects.html";

        }

    }, 1000);

}

function pauseTimer() {

    clearInterval(timerInterval);

    timerInterval = null;

}

function completeSubject() {

    localStorage.setItem(
        subject,
        "completed"
    );

    alert(
        `${subject} completed!`
    );

    window.location.href =
        "subjects.html";
}

updateTimer();

</script>

</body>
</html>
