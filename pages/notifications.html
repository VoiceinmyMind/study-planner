const semesterSelect =
    document.getElementById(

    );

const examGrid =
    document.getElementById(
        "examGrid"
    );

function loadExams() {

    examGrid.innerHTML = "";

    const semester =
        semesterSelect.value;

    const semesterExams =
        exams[degree][semester] || [];

    semesterExams.forEach(exam => {

        const enabled =
            localStorage.getItem(
                "notify_" + exam.subject
            );

        const card =
            document.createElement("div");

        card.className =
            "exam-card";

        card.innerHTML = `

            <h2>${exam.subject}</h2>

            <p>
                Exam Date:
                ${exam.date}
            </p>

            <label class="switch">

                <input type="checkbox"
                       ${enabled ? "checked" : ""}
                       onchange="toggleNotification(
                           '${exam.subject}'
                       )">

                <span class="slider"></span>

            </label>

        `;

        examGrid.appendChild(card);

    });

}

function toggleNotification(subject) {

    const key =
        "notify_" + subject;

    if(localStorage.getItem(key)) {

        localStorage.removeItem(key);

    } else {

        localStorage.setItem(
            key,
            "true"
        );

    }

}

semesterSelect.addEventListener(
    "change",
    loadExams
);

loadExams();
