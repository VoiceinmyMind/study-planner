<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Flashcards</title>

    <link rel="stylesheet"
          href="flashcards.css">
</head>
<body>

<nav>

    <a href="../index.html" class="nav-link">
        ← Home
    </a>

    <a href="flashcards-manage.html" class="nav-link nav-link-accent" id="manageLink">
        Manage Cards →
    </a>

</nav>

<div class="study-container">

    <div class="study-header">

        <p class="eyebrow">Study</p>

        <div class="subject-picker">
            <span class="subject-dot" id="subjectDot"></span>
            <select id="subjectSelect"></select>
        </div>

    </div>

    <div class="deck-stack" id="deckStack">

        <div class="stack-card stack-card-2"></div>
        <div class="stack-card stack-card-1"></div>

        <div class="flip-card" id="flipCard" tabindex="0">
            <div class="flip-card-inner" id="flipCardInner">

                <div class="flip-face flip-front">
                    <span class="face-label">Question</span>
                    <p id="questionText">Select a subject first</p>
                    <span class="face-hint">Tap or press space to flip</span>
                </div>

                <div class="flip-face flip-back">
                    <span class="face-label">Answer</span>
                    <p id="answerText"></p>
                    <span class="face-hint">Tap to flip back</span>
                </div>

            </div>
        </div>

    </div>

    <div class="progress-row" id="progressRow">
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-label" id="progressLabel">0 / 0</span>
    </div>

    <div class="controls-row" id="controlsRow">
        <button class="ctrl-btn" id="prevBtn" onclick="prevCard()">← Prev</button>
        <button class="ctrl-btn ctrl-btn-flip" onclick="flipCard()">Flip card</button>
        <button class="ctrl-btn" id="nextBtn" onclick="nextCard()">Next →</button>
    </div>

    <div class="empty-state" id="emptyState">
        <h2 id="emptyTitle">No subjects yet</h2>
        <p id="emptyText">Add a subject first, then come back here to study.</p>
        <a href="subjects.html" class="empty-cta" id="emptyCta">Go to Subjects →</a>
    </div>

</div>

<script>

// ── Subjects (added on the Subjects page) ───────────────
function loadSubjects() {
    return JSON.parse(localStorage.getItem("subjects") || "[]");
}

// ── Card decks: { subjectName: [{ id, q, a }] } ─────────
function loadDecks() {
    return JSON.parse(localStorage.getItem("flashcardDecks") || "{}");
}

// ── Elements ─────────────────────────────────────────────
const subjectSelect = document.getElementById("subjectSelect");
const subjectDot = document.getElementById("subjectDot");
const manageLink = document.getElementById("manageLink");

const deckStack = document.getElementById("deckStack");
const flipCard = document.getElementById("flipCard");
const flipCardInner = document.getElementById("flipCardInner");
const questionText = document.getElementById("questionText");
const answerText = document.getElementById("answerText");

const progressRow = document.getElementById("progressRow");
const progressFill = document.getElementById("progressFill");
const progressLabel = document.getElementById("progressLabel");
const controlsRow = document.getElementById("controlsRow");

const emptyState = document.getElementById("emptyState");
const emptyTitle = document.getElementById("emptyTitle");
const emptyText = document.getElementById("emptyText");
const emptyCta = document.getElementById("emptyCta");

let cards = [];
let currentIndex = 0;
let isFlipped = false;

// ── Populate subject dropdown ────────────────────────────
function populateSubjectSelect() {

    const subjects = loadSubjects();

    const params = new URLSearchParams(window.location.search);
    const preferred = params.get("subject");

    subjectSelect.innerHTML = "";

    subjects.forEach(subject => {
        const option = document.createElement("option");
        option.textContent = subject.name;
        option.value = subject.name;
        subjectSelect.appendChild(option);
    });

    if (preferred && subjects.some(s => s.name === preferred)) {
        subjectSelect.value = preferred;
    }

    return subjects;
}

function currentSubject(subjects) {
    return subjects.find(s => s.name === subjectSelect.value);
}

// ── Render ───────────────────────────────────────────────
function render() {

    const subjects = loadSubjects();

    manageLink.href = subjectSelect.value
        ? `flashcards-manage.html?subject=${encodeURIComponent(subjectSelect.value)}`
        : "flashcards-manage.html";

    if (!subjects.length) {
        showEmpty(
            "No subjects yet",
            "Add a subject first, then come back here to study.",
            "Go to Subjects →",
            "subjects.html"
        );
        return;
    }

    const subject = currentSubject(subjects);
    subjectDot.style.background = subject ? (subject.color || "#38bdf8") : "#38bdf8";
    flipCard.style.setProperty("--subject-color", subject ? (subject.color || "#38bdf8") : "#38bdf8");

    const decks = loadDecks();
    cards = decks[subjectSelect.value] || [];

    if (!cards.length) {
        showEmpty(
            "No cards yet",
            `You haven't added any flashcards for "${subjectSelect.value}" yet.`,
            "Add cards →",
            `flashcards-manage.html?subject=${encodeURIComponent(subjectSelect.value)}`
        );
        return;
    }

    hideEmpty();

    if (currentIndex >= cards.length) currentIndex = 0;

    showCard(currentIndex);
}

function showEmpty(title, text, ctaLabel, ctaHref) {

    deckStack.style.display = "none";
    progressRow.style.display = "none";
    controlsRow.style.display = "none";

    emptyTitle.textContent = title;
    emptyText.textContent = text;
    emptyCta.textContent = ctaLabel;
    emptyCta.href = ctaHref;

    emptyState.style.display = "flex";
}

function hideEmpty() {
    emptyState.style.display = "none";
    deckStack.style.display = "block";
    progressRow.style.display = "flex";
    controlsRow.style.display = "flex";
}

function showCard(index) {

    isFlipped = false;
    flipCardInner.classList.remove("flipped");

    const card = cards[index];
    questionText.textContent = card.q;
    answerText.textContent = card.a;

    progressLabel.textContent = `${index + 1} / ${cards.length}`;
    progressFill.style.width = `${((index + 1) / cards.length) * 100}%`;
}

// ── Interactions ─────────────────────────────────────────
function flipCardNow() {
    if (!cards.length) return;
    isFlipped = !isFlipped;
    flipCardInner.classList.toggle("flipped", isFlipped);
}

function prevCard() {
    if (!cards.length) return;
    currentIndex = (currentIndex - 1 + cards.length) % cards.length;
    showCard(currentIndex);
}

function nextCard() {
    if (!cards.length) return;

    const selectedSubject = subjectSelect.value;
    let reviewed = Number(localStorage.getItem("flashcards_" + selectedSubject)) || 0;
    reviewed++;
    localStorage.setItem("flashcards_" + selectedSubject, reviewed);

    currentIndex = (currentIndex + 1) % cards.length;
    showCard(currentIndex);
}

// exposed for inline onclick handlers
window.flipCard = flipCardNow;
window.prevCard = prevCard;
window.nextCard = nextCard;

flipCard.addEventListener("click", flipCardNow);

flipCard.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.key === "Enter") {
        e.preventDefault();
        flipCardNow();
    }
});

document.addEventListener("keydown", (e) => {
    if (e.target === subjectSelect) return;
    if (e.key === "ArrowRight") nextCard();
    if (e.key === "ArrowLeft") prevCard();
});

subjectSelect.addEventListener("change", () => {
    currentIndex = 0;
    render();
});

// ── Init ──────────────────────────────────────────────────
populateSubjectSelect();
render();

</script>

</body>
</html>
