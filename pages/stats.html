<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Statistics</title>

    <link rel="stylesheet"
          href="stats.css">
</head>
<body>

<nav>

    <a href="../index.html">
        ← Home
    </a>

</nav>

<div class="container">

    <h1>Statistics & Analytics</h1>

    <div class="overall-stats">

        <div class="stat-card">

            <h2 id="studyCount">
                0
            </h2>

            <p>Completed Study Sessions</p>

        </div>

        <div class="stat-card">

            <h2 id="flashcardCount">
                0
            </h2>

            <p>Flashcards Reviewed</p>

        </div>

        <div class="stat-card">

            <h2>
                82%
            </h2>

            <p>Learning Efficiency</p>

        </div>

    </div>

    <div class="filters">

        <div>

            <label>Select Semester</label>

            <select id="semesterSelect">

                <option value="1">
                    Semester 1
                </option>

                <option value="2">
                    Semester 2
                </option>

                <option value="3">
                    Semester 3
                </option>

                <option value="4">
                    Semester 4
                </option>

                <option value="5">
                    Semester 5
                </option>

                <option value="6">
                    Semester 6
                </option>

            </select>

        </div>

        <div>

            <label>Select Subject</label>

            <select id="subjectSelect"></select>

        </div>

    </div>

    <div class="subject-stats">

        <div class="big-stat">

            <h2 id="subjectName">
                Subject Statistics
            </h2>

            <p>
                Progress:
            </p>

            <div class="progress-bar">

                <div class="progress-fill"
                     id="progressFill">

                </div>

            </div>

            <span id="progressText">
                0%
            </span>

        </div>

    </div>

</div>

<script>

const degree =
    localStorage.getItem("degree");

const subjects = {

    informatics: {

        1: [
            "Programming 1",
            "Mathematics",
            "Business Management"
        ],

        2: [
            "Databases",
            "Web Development",
            "Statistics"
        ],

        3: [
            "Software Engineering",
            "Networks",
            "Accounting"
        ],

        4: [
            "Cyber Security",
            "Project Management",
            "AI Basics"
        ],

        5: [
            "Cloud Computing",
            "Machine Learning",
            "IT Consulting"
        ],

        6: [
            "Bachelor Thesis",
            "Business Analytics",
            "ERP Systems"
        ]

    },

    chemistry: {

        1: [
            "Organic Chemistry",
            "Physics",
            "Laboratory Basics"
        ],

        2: [
            "Biochemistry",
            "Chemical Analysis",
            "Thermodynamics"
        ],

        3: [
            "Inorganic Chemistry",
            "Molecular Biology",
            "Analytical Chemistry"
        ],

        4: [
            "Pharmaceutical Chemistry",
            "Environmental Chemistry",
            "Spectroscopy"
        ],

        5: [
            "Advanced Synthesis",
            "Toxicology",
            "Biotechnology"
        ],

        6: [
            "Bachelor Thesis",
            "Research Methods",
            "Chemical Engineering"
        ]

    }

};

const semesterSelect =
    document.getElementById("semesterSelect");

const subjectSelect =
    document.getElementById("subjectSelect");

function loadSubjects() {

    const semester =
        semesterSelect.value;

    subjectSelect.innerHTML = "";

    const semesterSubjects =
        subjects[degree][semester] || [];

    semesterSubjects.forEach(subject => {

        const option =
            document.createElement("option");

        option.textContent = subject;

        subjectSelect.appendChild(option);

    });

    updateStats();

}

semesterSelect.addEventListener(
    "change",
    loadSubjects
);

subjectSelect.addEventListener(
    "change",
    updateStats
);

function updateStats() {

    const subject =
        subjectSelect.value;

    document.getElementById(
        "subjectName"
    ).innerText = subject;

    const flashcards =
        Number(
            localStorage.getItem(
                "flashcards_" + subject
            )
        ) || 0;

    const completed =
        localStorage.getItem(subject);

    let progress = 20;

    if(flashcards > 0) {
        progress += flashcards * 5;
    }

    if(completed) {
        progress += 40;
    }

    if(progress > 100) {
        progress = 100;
    }

    document.getElementById(
        "progressFill"
    ).style.width =
        progress + "%";

    document.getElementById(
        "progressText"
    ).innerText =
        progress + "%";

}

document.getElementById(
    "studyCount"
).innerText =

    Object.keys(localStorage)
    .filter(key =>
        localStorage.getItem(key)
        === "completed"
    ).length;

document.getElementById(
    "flashcardCount"
).innerText =

    Object.keys(localStorage)
    .filter(key =>
        key.startsWith("flashcards_")
    )
    .reduce((sum, key) =>
        sum +
        Number(localStorage.getItem(key)),
        0
    );

loadSubjects();

</script>

</body>
</html>
