<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Statistics</title>

    <link rel="stylesheet"
          href="stats.css">
</head>
<body>

<nav>

    <a href="../index.html">
        ← Home
    </a>

</nav>

<div class="container">

    <h1>Statistics & Analytics</h1>

    <div class="overall-stats">

        <div class="stat-card">

            <h2 id="studyCount">
                0
            </h2>

            <p>Completed Study Sessions</p>

        </div>

        <div class="stat-card">

            <h2 id="flashcardCount">
                0
            </h2>

            <p>Flashcards Reviewed</p>

        </div>

        <div class="stat-card">

            <h2>
                82%
            </h2>

            <p>Learning Efficiency</p>

        </div>

    </div>

    <div class="filters">

        <div>

            <label>Select Subject</label>

            <select id="subjectSelect"></select>

        </div>

    </div>

    <div class="subject-stats">

        <div class="big-stat">

            <h2 id="subjectName">
                Subject Statistics
            </h2>

            <p>
                Progress:
            </p>

            <div class="progress-bar">

                <div class="progress-fill"
                     id="progressFill">

                </div>

            </div>

            <span id="progressText">
                0%
            </span>

        </div>

    </div>

</div>

<script>

// Subjects are read from the ones the user added on the
// Subjects page (localStorage "subjects").
function loadUserSubjects() {
    return JSON.parse(localStorage.getItem("subjects") || "[]");
}

const subjectSelect =
    document.getElementById("subjectSelect");

function loadSubjects() {

    subjectSelect.innerHTML = "";

    const userSubjects = loadUserSubjects();

    if (!userSubjects.length) {

        const option =
            document.createElement("option");

        option.textContent = "No subjects yet – add one first";
        option.value = "";

        subjectSelect.appendChild(option);

        updateStats();

        return;
    }

    userSubjects.forEach(subject => {

        const option =
            document.createElement("option");

        option.textContent = subject.name;
        option.value = subject.name;

        subjectSelect.appendChild(option);

    });

    updateStats();

}

subjectSelect.addEventListener(
    "change",
    updateStats
);

function updateStats() {

    const subject =
        subjectSelect.value;

    document.getElementById(
        "subjectName"
    ).innerText = subject;

    const flashcards =
        Number(
            localStorage.getItem(
                "flashcards_" + subject
            )
        ) || 0;

    const completed =
        localStorage.getItem(subject);

    let progress = 20;

    if(flashcards > 0) {
        progress += flashcards * 5;
    }

    if(completed) {
        progress += 40;
    }

    if(progress > 100) {
        progress = 100;
    }

    document.getElementById(
        "progressFill"
    ).style.width =
        progress + "%";

    document.getElementById(
        "progressText"
    ).innerText =
        progress + "%";

}

document.getElementById(
    "studyCount"
).innerText =

    Object.keys(localStorage)
    .filter(key =>
        localStorage.getItem(key)
        === "completed"
    ).length;

document.getElementById(
    "flashcardCount"
).innerText =

    Object.keys(localStorage)
    .filter(key =>
        key.startsWith("flashcards_")
    )
    .reduce((sum, key) =>
        sum +
        Number(localStorage.getItem(key)),
        0
    );

loadSubjects();

</script>

</body>
</html>
